services:
  app:
    build:
      context: .
      args:
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENV: ${VITE_SENTRY_ENV:-production}
    restart: unless-stopped
    # App is reached by cloudflared over the internal docker network at app:8080.
    # No host-port binding — public traffic comes in via the cloudflared tunnel.
    expose:
      - "8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app

  # ─── Analytics ───────────────────────────────────────────────────────────
  # Umami admin is bound to the Tailscale IP only (UMAMI_BIND in .env).
  # Tracking script is served on the same domain via Caddy reverse-proxy below.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    ports:
      # Admin UI: Tailscale-only. UMAMI_BIND defaults to 127.0.0.1 if unset
      # (safe for local dev). On synicloud, set to the Tailscale interface IP.
      - "${UMAMI_BIND:-127.0.0.1}:3000:3000"
    depends_on:
      umami-db:
        condition: service_healthy

  umami-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  umami-pgdata:
