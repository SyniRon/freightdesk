services:
  app:
    build:
      context: .
      args:
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    ports:
      # Pre-launch: bind to Tailscale interface (same var as Umami) so the
      # app is reachable from tailnet for smoke testing before going public.
      # When cloudflared is re-enabled below, swap this back to `expose: ["8080"]`
      # so only cloudflared reaches it on the internal network.
      - "${UMAMI_BIND:-127.0.0.1}:8080:8080"

  # cloudflared: disabled pre-launch. Re-enable (and swap app's `ports` back to
  # `expose: ["8080"]`) once the in-game contract-window smoke test passes and
  # you're ready to go public at freightdesk.syniron.com.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${TUNNEL_TOKEN}
  #   depends_on:
  #     - app

  # ─── Analytics ───────────────────────────────────────────────────────────
  # Umami admin is bound to the Tailscale IP only (UMAMI_BIND in .env).
  # Tracking script is served on the same domain via Caddy reverse-proxy below.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    ports:
      # Admin UI: Tailscale-only. UMAMI_BIND defaults to 127.0.0.1 if unset
      # (safe for local dev). On synicloud, set to the Tailscale interface IP.
      - "${UMAMI_BIND:-127.0.0.1}:3000:3000"
    depends_on:
      umami-db:
        condition: service_healthy

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  umami-pgdata:
