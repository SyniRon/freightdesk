services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    # No host port exposed — only cloudflared reaches it on the internal network.

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app
