id: adfu-kum-n-go
name: ADFU Kum N Go Transport Group
tagline: Internal alliance freight

# Service-level defaults
minReward: 5000000
maxVol: 350000
# (no maxCollateral — service does not cap collateral)

routes:
  # C-J6MT → Jita: max(vol×rate, collateral×%)
  - origin: cj6mt
    destination: jita44
    formula:
      kind: max
      ratePerM3: 900
      collateralPct: 0.005    # 0.5%
    rushFee: 250000000        # +250M ISK

  # Jita → C-J6MT: vol×rate only (no collateral component)
  - origin: jita44
    destination: cj6mt
    formula:
      kind: rate-only
      ratePerM3: 700
    rushFee: 250000000

# Contract window settings — informational only (not paste fields).
# These are the dropdown picks the user has to set manually in EVE's Create Contract dialog.
contract:
  expiration: 1 week
  daysToComplete: 7 days
  descriptionHint: optional  # literal value shown to user — meaning EVE's description field can be left blank
