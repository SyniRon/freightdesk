<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FreightDesk — EVE shipping helper</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Umami analytics — only loads when VITE_UMAMI_WEBSITE_ID is set at build time -->
    <script type="module">
      const wid = import.meta.env.VITE_UMAMI_WEBSITE_ID;
      if (wid) {
        const s = document.createElement("script");
        s.async = true;
        s.defer = true;
        s.dataset.websiteId = wid;
        s.dataset.hostUrl = "/umami";
        s.src = "/umami/script.js";
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
